<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Example Domain</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

    :root {
      --color-primary: #3344ee;
      --color-secondary: #222;
      --color-bg: #eeeeee;
    }

    body {
      font-family: 'Poppins', sans-serif;
      color: var(--color-secondary);
      background-color: var(--color-bg);
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      color: var(--color-primary);
    }

    nav ul {
      display: flex;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    nav li {
      margin-left: 20px;
    }

    nav a {
      color: var(--color-secondary);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s ease;
    }

    nav a:hover {
      color: var(--color-primary);
    }

    .hero {
      padding: 80px 0;
      text-align: center;
    }

    .hero h1 {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .hero p {
      font-size: 18px;
      margin-bottom: 40px;
    }

    .cta {
      display: inline-block;
      background-color: var(--color-primary);
      color: #fff;
      padding: 12px 24px;
      border-radius: 4px;
      text-decoration: none;
      font-weight: 600;
      transition: background-color 0.3s ease;
    }

    .cta:hover {
      background-color: #2a3ecc;
    }

    @media (max-width: 768px) {
      .container {
        padding: 20px;
      }

      header {
        flex-direction: column;
        align-items: flex-start;
      }

      nav ul {
        flex-direction: column;
        margin-top: 20px;
      }

      nav li {
        margin-left: 0;
        margin-bottom: 10px;
      }

      .hero h1 {
        font-size: 36px;
      }

      .hero p {
        font-size: 16px;
      }
    }

    @media (max-width: 480px) {
      .hero {
        padding: 60px 0;
      }

      .hero h1 {
        font-size: 28px;
      }

      .hero p {
        font-size: 14px;
      }

      .cta {
        padding: 10px 20px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">Example Domain</div>
    <nav>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h1>Example Domain</h1>
      <p>This domain is for use in documentation examples without needing permission. Avoid use in operations.</p>
      <a href="https://iana.org/domains/example" class="cta">Learn More</a>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>&copy; Example Domain. All rights reserved.</p>
    </div>
  </footer>

</html>
