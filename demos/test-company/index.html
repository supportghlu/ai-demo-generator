<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Example Domain</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

    :root {
      --color-primary: #3344ee;
      --color-secondary: #222;
      --color-bg: #eeeeee;
    }

    body {
      font-family: 'Poppins', sans-serif;
      color: var(--color-secondary);
      background-color: var(--color-bg);
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px;
    }

    header {
      text-align: center;
      padding: 80px 0;
    }

    h1 {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .cta {
      display: inline-block;
      background-color: var(--color-primary);
      color: #fff;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 600;
      transition: background-color 0.3s ease;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .cta:hover {
      background-color: #2a3cc0;
      box-shadow: 0 6px 8px rgba(0, 0, 0, 0.15);
    }

    @media (max-width: 768px) {
      .container {
        padding: 20px;
      }

      h1 {
        font-size: 36px;
      }

      p {
        font-size: 16px;
      }
    }

    @media (max-width: 480px) {
      header {
        padding: 60px 0;
      }

      h1 {
        font-size: 28px;
      }

      p {
        font-size: 14px;
      }

      .cta {
        font-size: 14px;
        padding: 10px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Example Domain</h1>
      <p>This domain is for use in documentation examples without needing permission. Avoid use in operations.</p>
      <a href="https://iana.org/domains/example" class="cta">Learn more</a>
    </header>
  </div>
